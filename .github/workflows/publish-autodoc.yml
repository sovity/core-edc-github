name: publish autodoc

on:
  workflow_call:
    inputs:
      version:
        required: false
        description: "version override"
        type: string

jobs:
  generate-and-deploy-doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Check out the actions repo so local action references resolve
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: sovity/core-edc-github
          ref: ${{ github.job_workflow_sha }}
          path: .reusable-actions
      - uses: ./.reusable-actions/.github/actions/publish-autodoc
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
