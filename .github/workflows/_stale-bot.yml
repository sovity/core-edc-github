  workflow_dispatch: # allow manual trigger

jobs:
  trigger-workflow:
    uses: sovity/core-edc-github/.github/workflows/stale-bot.yml@0.11.1_2025-03-10_2
    secrets:
      envGH: ${{ secrets.GITHUB_TOKEN }}