  workflow_dispatch: # allow manual trigger

jobs:
  trigger-workflow:
    uses: sovity/core-edc-github/.github/workflows/stale-bot.yml@0.14.0_2025-08-21_3
    secrets:
      envGH: ${{ secrets.GITHUB_TOKEN }}