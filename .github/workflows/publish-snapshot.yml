name: "Publish Snapshot Build"

on:
  workflow_dispatch:
  workflow_call:

jobs:
  Publish-Snapshot:
    name: "Publish artefacts to Snapshots repository"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: sovity/core-edc-github/.github/actions/setup-build@0.14.0_2025-08-21_3
      - uses: sovity/core-edc-github/.github/actions/publish-maven-artifacts@0.14.0_2025-08-21_3
        with:
          gpg-private-key: ${{ secrets.ORG_GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.ORG_GPG_PASSPHRASE }}
          username: ${{ secrets.CENTRAL_SONATYPE_TOKEN_USERNAME }}
          password: ${{ secrets.CENTRAL_SONATYPE_TOKEN_PASSWORD }}

